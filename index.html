<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎲 D&D Gacha</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>🎲 D&D Loot Gacha</h1>
      <p class="subtitle">Кликни на талончик → Нажми "Крутить"</p>
    </header>

    <!-- ТАЛОНЧИКИ -->
    <section class="tickets-panel">
      <h2>💳 Мои талончики</h2>
      <div class="tickets-grid">
        <div class="ticket-card common" data-rarity="common">
          <span class="rarity-name">Обычный</span>
          <span class="ticket-count" id="ticket-common">0</span>
          <button class="upgrade-btn" data-upgrade="common">↑ 3→1</button>
        </div>
        <div class="ticket-card uncommon" data-rarity="uncommon">
          <span class="rarity-name">Необычный</span>
          <span class="ticket-count" id="ticket-uncommon">0</span>
          <button class="upgrade-btn" data-upgrade="uncommon">↑ 3→1</button>
        </div>
        <div class="ticket-card rare" data-rarity="rare">
          <span class="rarity-name">Редкий</span>
          <span class="ticket-count" id="ticket-rare">0</span>
          <button class="upgrade-btn" data-upgrade="rare">↑ 3→1</button>
        </div>
        <div class="ticket-card epic" data-rarity="epic">
          <span class="rarity-name">Эпический</span>
          <span class="ticket-count" id="ticket-epic">0</span>
          <button class="upgrade-btn" data-upgrade="epic">↑ 3→1</button>
        </div>
        <div class="ticket-card legendary" data-rarity="legendary">
          <span class="rarity-name">Легендарный</span>
          <span class="ticket-count" id="ticket-legendary">0</span>
          <button class="upgrade-btn" disabled>MAX</button>
        </div>
      </div>
    </section>

    <!-- КРУТКА -->
    <section class="gacha-section">
      <h2>🎰 Крутка</h2>
      <button id="spin-btn" class="spin-button">🎲 Крутить</button>
      <div id="gacha-result" class="gacha-result"></div>
    </section>

    <!-- СТАТИСТИКА -->
    <section class="stats-section">
      <h2>📊 Статистика</h2>
      <div class="stats-grid">
        <div class="stat-card">
          <span class="stat-label">Круток</span>
          <span class="stat-value" id="total-spins">0</span>
        </div>
      </div>
    </section>

    <!-- ИНСТРУКЦИЯ -->
    <section class="info-section">
      <h3>ℹ️ Инструкция:</h3>
      <ol>
        <li>Кликни на карточку талончика</li>
        <li>Нажми "Крутить"</li>
        <li>Получи предмет + талончик обратно!</li>
        <li>Улучшай: 3→1</li>
      </ol>
    </section>

    <footer class="footer">
      <button id="reset-btn" class="reset-btn">🔄 Сброс</button>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
